services:
  cassandra:
    image: 'cassandra:3.11'
    container_name: cassandra
    hostname: cassandra
    environment:
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=1G
      - CASSANDRA_CLUSTER_NAME=thp
    volumes:
      - './vol/cassandra/data:/var/lib/cassandra/data'
  erletxea:
    image: 'ghcr.io/mikelaz/erletxea:latest'
    container_name: erletxea
    restart: unless-stopped
    depends_on:
      - cassandra
    ports:
      - '0.0.0.0:9000:9000'
    volumes:
      - ./vol/erletxea/application.conf:/etc/thehive/application.conf
      - ./vol/erletxea/data:/opt/thp/thehive/data
      - ./vol/erletxea/index:/opt/thp/thehive/index
    command: '--no-config --no-config-secret'
